<html lang="en">

  <title>Multiverse tower defense (Unofficial)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

    :root{
      --bg:linear-gradient(135deg,#8a2be2,#2979ff,#1de9b6);

      --card:#161b36;
      --text:#e8ecf1;
      --muted:#a1aacf;
      --accent:#8a2be2;
      --win:#3cff9a;
      --lose:#ff4c4c;
      --fair:#ffeb3b;
      @media (max-width: 768px) {

  nav{
    flex-direction:column;
    gap:10px;
    padding:12px;
    text-align:center;
  }

  nav div{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
  }

  section{
    padding:20px;
  }

  .hero h1{
    font-size:22px;
  }

  .hero img{
    width:90px;
  }

  .grid{
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:12px;
  }

  .trade{
    flex-direction:column;
  }

  .trade-side{
    padding:15px;
  }

  .Unit img{
    width:45px;
  }

  .add{
    width:100%;
    height:50px;
    font-size:14px;
  }

  .discord-btn{
    width:90%;
    justify-content:center;
    left:50%;
    transform:translateX(-50%);
  }

}
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:var(--bg);
      background-size:400% 400%;
      animation:bgAnim 15s ease infinite;
      color:var(--text);
    }
    @keyframes bgAnim{
      0%{background-position:0 0}
      50%{background-position:100% 100%}
      100%{background-position:0 0}
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 40px;
      background:rgba(0,0,0,.5);
      border-radius:0 0 20px 20px;
    }
    nav b{font-size:18px}
    nav button{
      background:none;
      border:none;
      color:var(--muted);
      margin-left:20px;
      cursor:pointer;
      font-size:14px;
      font-weight:600;
    }
    nav button:hover{color:#fff}

    section{display:none;padding:40px;max-width:1400px;margin:auto}
    section.active{display:block}

    .hero{text-align:center}
    .hero img{width:120px;border-radius:20px;box-shadow:0 0 40px #fff}
    .hero h1{
      margin:20px 0 10px;
      background:linear-gradient(90deg,#8a2be2,#2979ff,#1de9b6);
      -webkit-background-clip:text;
      color:transparent;
      font-size:32px;
    }

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
    .value-card{background:rgba(0,0,0,.4);border-radius:18px;padding:16px}
    .value-card img{width:100%;border-radius:14px}
    .value-card b{display:block;margin-top:10px}
    .value-card span{display:block;color:var(--muted);margin-top:6px;font-size:13px}

    .trade{display:flex;flex-wrap:wrap;gap:30px}
    .trade-side{
      flex:1;
      background:rgba(0,0,0,.5);
      border-radius:24px;
      padding:25px;
      min-width:280px;
    }

    .Unit{
      display:flex;
      gap:12px;
      align-items:center;
      background:rgba(0,0,0,.3);
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
      cursor:pointer;
      position:relative;
    }
    .Unit img{width:60px;border-radius:12px;box-shadow:0 0 20px #fff}
    .Unit .overlay{
      position:absolute;
      top:4px;
      right:4px;
      font-size:14px;
      font-weight:bold;
      color:#fff;
      padding:2px 5px;
      border-radius:4px;
      background:shinyrod;
    }
    .Unit .value{
      margin-left:auto;
      font-weight:700;
      color:#fff;
    }

    .variant-row{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}
.vbtn{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  font-size:12px;
  background:rgba(255,255,255,.08);
  color:var(--text);
}
.vbtn:hover{background:rgba(255,255,255,.15)}
.vbtn.active{
  background:var(--accent);
  color:#000;
}
.value-line{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
}


    .total{text-align:right;margin-top:12px;font-weight:600}

    .add{
      width:64px;height:64px;
      border:none;
      border-radius:12px;
      background:var(--accent);
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-weight:600;
      color:black;
      margin-top:12px;
    }

    .result{text-align:center;font-size:26px;margin-top:30px}

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.75);
      display:flex;
      justify-content:center;
      align-items:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .15s ease;
    }
    .modal.show{opacity:1;pointer-events:auto}
    .modal-box{
      background:rgba(0,0,0,.8);
      padding:25px;
      border-radius:22px;
      width:320px;
    }
    .modal-box label{display:block;margin-top:10px;color:var(--muted);font-size:13px}
    .modal-box select,.modal-box input{
      width:100%;
      padding:10px;
      margin-top:6px;
      border-radius:10px;
      border:none;
      background:#222;
      color:white;
      outline:none;
    }
    .modal-box h3{margin:0 0 6px}

    .discord-btn{

      bottom:24px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 18px;
      background:rgba(88,101,242,0.95);
      border-radius:999px;
      text-decoration:none;
      box-shadow:0 0 25px rgba(88,101,242,0.6);
      transition:transform .2s ease, box-shadow .2s ease;
      z-index:999;
    }
    .discord-btn:hover{
      transform:translateX(-50%) scale(1.08);
      box-shadow:0 0 40px rgba(88,101,242,0.9);
    }
    .discord-btn img{
      width:28px;
      height:28px;
      border-radius:50%;
    }
    .discord-btn span{
      color:white;
      font-weight:700;
      font-size:14px;
      white-space:nowrap;
    }
    .discord-btn.hide{display:none}
  </style>
</head>

function updateTotals(){
  const sum = (side) =>
    [...document.querySelectorAll(`#${side} .value`)]
      .reduce((a,b)=> a + (+b.textContent || 0), 0);

  const y = sum("you");
  const t = sum("them");

  yt.textContent = y.toFixed(2);
  tt.textContent = t.toFixed(2);

  const d = y - t;

  res.textContent = d >= 0.6 ? "Lose 💀" : d <= -0.6 ? "Win 🤑" : "Fair 🤝";
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "home") discordBtn.classList.remove("hide");
  else discordBtn.classList.add("hide");
}

function populateSelect(){
  UnitSelect.innerHTML = "";

  const isItem = typeSelect.value === "item";
  const list = isItem ? Items : Units;

  list.forEach((p, i) => {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = p.name;
    UnitSelect.appendChild(o);
  });
}


show("home");

function addUnit(){
  const amtVal = +amt.value || 1;
  const sig = +signed.value;
  const shinyVal = +shny.value;

  const index = +UnitSelect.value;
  const isItem = typeSelect.value === "item";

  const baseList = isItem ? Items : Units;
  const baseItem = baseList[index];
  if (!baseItem) return;

  let finalBase = baseItem.base;

  if (!isItem) {
    if (sig > 1 && shinyVal > 1 && UnitsBH[index]) {
      finalBase = UnitsBH[index].base;
    } else if (sig > 1 && UnitsSI[index]) {
      finalBase = UnitsSI[index].base;
    } else if (shinyVal > 1 && UnitsSH[index]) {
      finalBase = UnitsSH[index].base;
    }
  }

  const val = (finalBase * amtVal).toFixed(2);

  let overlay = "";
  if (!isItem) {
    if (sig > 1) overlay += "✍️ ";
    if (shinyVal > 1) overlay += "✨";
  }

  const el = document.createElement("div");
  el.className = "Unit";

  el.innerHTML = `
    <img src="${baseItem.img}">
    ${overlay ? `<div class="overlay">${overlay}</div>` : ""}
    <div>
      <b>${baseItem.name} x${amtVal}</b>
      <div style="color:var(--muted);font-size:13px;">
        ${isItem ? "Item" : "Demand " + baseItem.demand + "/10"}
      </div>
    </div>
    <span class="value">${val}</span>
  `;

  el.onclick = () => { el.remove(); updateTotals(); };

  document.querySelector(`#${currentSide} .list`).appendChild(el);

  modal.classList.remove("show");
  updateTotals();
}

typeSelect.addEventListener("change", () => {
  const isItem = typeSelect.value === "item";

  signed.style.display = isItem ? "none" : "block";
  shny.style.display = isItem ? "none" : "block";

  signed.previousElementSibling.style.display = isItem ? "none" : "block";
  shny.previousElementSibling.style.display = isItem ? "none" : "block";

  if (isItem) {
    signed.value = "1";
    shny.value = "1";
  }
});

</script>
</body>
</html>
